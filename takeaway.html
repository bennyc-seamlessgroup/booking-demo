<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Takeaway</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="page">

    <div class="topbar">
      <button id="langToggle" class="lang-toggle">中文</button>
    </div>

    <!-- Restaurant -->
    <section class="hero">
      <img id="img" class="hero-image" />
      <div class="hero-content">
        <h1 id="name"></h1>
        <p id="desc"></p>
      </div>
    </section>

    <!-- Menu -->
    <section class="booking-card">
      <h2 id="menuTitle"></h2>
      <div id="menuList"></div>
    </section>

    <!-- Cart -->
    <section class="booking-card">
      <h2 id="cartTitle"></h2>
      <div id="cartList"></div>

      <div id="total"></div>

      <button id="checkoutBtn" class="submit-btn"></button>
    </section>

  </div>

  <!-- Apple Pay Modal -->
  <div id="paymentModal" class="modal hidden">
    <div class="modal-content">
      <div class="applepay-header"> Pay</div>
      <div id="paymentAmount"></div>
      <button id="payNow" class="submit-btn">Pay</button>
    </div>
  </div>

  <!-- Loading -->
  <div id="loading" class="modal hidden">
    <div class="modal-content">
      <div class="loader"></div>
      <p>Processing payment...</p>
    </div>
  </div>

  <!-- Success -->
  <div id="success" class="modal hidden">
    <div class="modal-content">
      <h2>✅ Payment Successful</h2>
      <p>Your order is confirmed.</p>
    </div>
  </div>

  <script src="./restaurants.js"></script>
  <script src="./takeaway.js"></script>
</body>
</html>
