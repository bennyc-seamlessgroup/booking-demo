<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Takeaway</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="page">
    <div class="topbar">
      <button id="langToggle" class="lang-toggle">中文</button>
    </div>

    <section class="hero">
      <img id="img" class="hero-image" />
      <div class="hero-content">
        <h1 id="name"></h1>
        <p id="desc"></p>
      </div>
    </section>

    <section class="booking-card">
      <h2 id="title"></h2>

      <div class="form-grid">
        <div class="field">
          <label id="labelName"></label>
          <input id="customerName" />
        </div>

        <div class="field">
          <label id="labelTime"></label>
          <input id="pickupTime" type="time" />
        </div>

        <div class="field full">
          <label id="labelNote"></label>
          <textarea id="note"></textarea>
        </div>
      </div>

      <button id="submit" class="submit-btn"></button>

      <div id="result" class="result"></div>
    </section>
  </div>

  <script src="./restaurants.js"></script>
  <script>
    const p = new URLSearchParams(location.search);
    const rid = p.get("rid");
    const lang = p.get("lang") === "zh" ? "zh" : "en";
    const phone = p.get("phone") || "";

    const r = window.RESTAURANTS.find(x => x.id === rid);
    const isZh = lang === "zh";

    document.getElementById("name").innerText =
      isZh ? r.name : r.en_name;

    document.getElementById("desc").innerText =
      isZh ? r.desc : r.desc_en;

    document.getElementById("img").src = r.image_url;

    document.getElementById("title").innerText =
      isZh ? "外賣下單" : "Place Takeaway Order";

    document.getElementById("labelName").innerText =
      isZh ? "你的姓名" : "Your name";

    document.getElementById("labelTime").innerText =
      isZh ? "取餐時間" : "Pickup time";

    document.getElementById("labelNote").innerText =
      isZh ? "備註" : "Note";

    document.getElementById("submit").innerText =
      isZh ? "提交外賣" : "Submit Order";

    document.getElementById("submit").onclick = async () => {
      const payload = {
        restaurant_id: rid,
        restaurant_name: r.name,
        customer_name: document.getElementById("customerName").value,
        pickup_time: document.getElementById("pickupTime").value,
        note: document.getElementById("note").value,
        customer_phone: phone,
        type: "takeaway",
        language: lang
      };

      await fetch("YOUR_WEBHOOK_URL", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      document.getElementById("result").className = "result success";
      document.getElementById("result").innerText =
        isZh ? "已提交外賣訂單" : "Order submitted";
    };

    document.getElementById("langToggle").onclick = () => {
      const newLang = lang === "zh" ? "en" : "zh";
      location.search = `?rid=${rid}&phone=${phone}&lang=${newLang}`;
    };
  </script>
</body>
</html>
