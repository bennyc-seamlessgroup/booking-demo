<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Restaurant Booking</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="page">
    <div class="topbar">
      <button id="langToggle" class="lang-toggle" type="button">中文</button>
    </div>

    <section class="hero">
      <img id="restaurantImage" class="hero-image" src="" alt="Restaurant image" />
      <div class="hero-content">
        <div id="eyebrow" class="eyebrow">Restaurant Booking</div>
        <h1 id="restaurantName" class="restaurant-name">Loading...</h1>

        <div class="meta-row">
          <span id="restaurantArea" class="chip">Loading area</span>
          <span id="restaurantCuisine" class="chip">Loading cuisine</span>
          <span id="restaurantPrice" class="chip">Loading price</span>
          <span id="restaurantScore" class="chip">Loading score</span>
        </div>

        <p id="restaurantDesc" class="restaurant-desc">Loading restaurant details...</p>
      </div>
    </section>

    <section class="booking-card">
      <h2 id="sectionTitle" class="section-title">Book a table</h2>
      <p id="sectionSubtitle" class="section-subtitle">Choose your preferred date, time, and party size.</p>

      <form id="bookingForm">
        <div class="form-grid">
          <div class="field">
            <label id="labelDate" for="bookingDate">Date</label>
            <input id="bookingDate" type="date" required />
          </div>

          <div class="field">
            <label id="labelTime" for="bookingTime">Time</label>
            <select id="bookingTime" required>
              <option value="">Select time</option>
              <option>12:00</option>
              <option>12:30</option>
              <option>13:00</option>
              <option>18:00</option>
              <option>18:30</option>
              <option>19:00</option>
              <option>19:30</option>
              <option>20:00</option>
              <option>20:30</option>
              <option>21:00</option>
            </select>
          </div>

          <div class="field">
            <label id="labelParty" for="partySize">Party size</label>
            <select id="partySize" required>
              <option value="">Select party size</option>
              <option>1</option>
              <option>2</option>
              <option>3</option>
              <option>4</option>
              <option>5</option>
              <option>6</option>
              <option>8</option>
              <option>10</option>
            </select>
          </div>

          <div class="field">
            <label id="labelName" for="customerName">Your name</label>
            <input id="customerName" type="text" placeholder="Enter your name" required />
          </div>

          <div class="field full">
            <label id="labelNote" for="note">Special request</label>
            <textarea id="note" placeholder="Optional: birthday, dietary request, seating preference..."></textarea>
          </div>
        </div>

        <div class="submit-wrap">
          <button id="submitBtn" class="submit-btn" type="submit">Submit booking</button>
        </div>
      </form>

      <div id="resultBox" class="result"></div>
    </section>
  </div>

  <script src="./restaurants.js"></script>
  <script src="./app.js"></script>
</body>
</html>
