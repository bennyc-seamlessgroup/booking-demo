<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Restaurant Booking</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: #e5e7eb;
      --primary: #111827;
      --primary-hover: #000000;
      --success-bg: #ecfdf5;
      --success-text: #065f46;
      --error-bg: #fef2f2;
      --error-text: #991b1b;
      --shadow: 0 10px 30px rgba(17, 24, 39, 0.08);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 14px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      font-family: Inter, Arial, sans-serif;
      background: linear-gradient(180deg, #f8fafc 0%, #f3f4f6 100%);
      color: var(--text);
    }

    body {
      min-height: 100vh;
      padding-bottom: env(safe-area-inset-bottom);
    }

    .page {
      max-width: 760px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }

    .hero {
      background: var(--card);
      border: 1px solid rgba(229, 231, 235, 0.8);
      border-radius: var(--radius-xl);
      overflow: hidden;
      box-shadow: var(--shadow);
      margin-bottom: 18px;
    }

    .hero-image {
      width: 100%;
      height: 230px;
      object-fit: cover;
      display: block;
      background: #d1d5db;
    }

    .hero-content {
      padding: 18px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .restaurant-name {
      margin: 0 0 10px;
      font-size: 30px;
      line-height: 1.1;
      letter-spacing: -0.03em;
    }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      padding: 8px 11px;
      border-radius: 999px;
      background: #f3f4f6;
      color: #374151;
      font-size: 13px;
      font-weight: 600;
    }

    .restaurant-desc {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
      font-size: 15px;
    }

    .booking-card {
      background: var(--card);
      border: 1px solid rgba(229, 231, 235, 0.8);
      border-radius: var(--radius-xl);
      padding: 20px;
      box-shadow: var(--shadow);
    }

    .section-title {
      margin: 0 0 6px;
      font-size: 24px;
      letter-spacing: -0.02em;
    }

    .section-subtitle {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
      min-width: 0;
    }

    .field {
      min-width: 0;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 700;
      color: #374151;
    }

    input,
    select,
    textarea {
      display: block;
      width: 100%;
      max-width: 100%;
      min-width: 0;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      background: #fff;
      padding: 14px 14px;
      font-size: 16px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input[type="date"],
    input[type="time"],
    select {
      -webkit-appearance: none;
      appearance: none;
      min-height: 48px;
    }

    textarea {
      min-height: 110px;
      resize: vertical;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: #9ca3af;
      box-shadow: 0 0 0 4px rgba(17, 24, 39, 0.06);
    }

    .submit-wrap {
      margin-top: 18px;
      position: sticky;
      bottom: max(12px, env(safe-area-inset-bottom));
    }

    .submit-btn {
      width: 100%;
      border: none;
      border-radius: 16px;
      background: var(--primary);
      color: #fff;
      padding: 15px 18px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(17, 24, 39, 0.16);
      transition: transform 0.15s ease, background 0.2s ease, opacity 0.2s ease;
    }

    .submit-btn:hover {
      background: var(--primary-hover);
    }

    .submit-btn:active {
      transform: translateY(1px);
    }

    .submit-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .result {
      display: none;
      margin-top: 16px;
      padding: 14px 16px;
      border-radius: 16px;
      font-size: 15px;
      line-height: 1.5;
    }

    .result.success {
      display: block;
      background: var(--success-bg);
      color: var(--success-text);
      border: 1px solid #a7f3d0;
    }

    .result.error {
      display: block;
      background: var(--error-bg);
      color: var(--error-text);
      border: 1px solid #fecaca;
    }

    .not-found {
      text-align: center;
      color: var(--muted);
      padding: 40px 20px;
    }

    @media (min-width: 640px) {
      .page {
        padding: 28px 20px 48px;
      }

      .hero-content,
      .booking-card {
        padding: 24px;
      }

      .form-grid {
        grid-template-columns: 1fr 1fr;
      }

      .field.full {
        grid-column: 1 / -1;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="hero">
      <img id="restaurantImage" class="hero-image" src="" alt="Restaurant image" />
      <div class="hero-content">
        <div class="eyebrow">Restaurant Booking</div>
        <h1 id="restaurantName" class="restaurant-name">Loading...</h1>

        <div class="meta-row">
          <span id="restaurantArea" class="chip">Loading area</span>
          <span id="restaurantCuisine" class="chip">Loading cuisine</span>
          <span id="restaurantPrice" class="chip">Loading price</span>
          <span id="restaurantScore" class="chip">Loading score</span>
        </div>

        <p id="restaurantDesc" class="restaurant-desc">Loading restaurant details...</p>
      </div>
    </section>

    <section class="booking-card">
      <h2 class="section-title">Book a table</h2>
      <p class="section-subtitle">Choose your preferred date, time, and party size.</p>

      <form id="bookingForm">
        <div class="form-grid">
          <div class="field">
            <label for="bookingDate">Date</label>
            <input id="bookingDate" type="date" required />
          </div>

          <div class="field">
            <label for="bookingTime">Time</label>
            <select id="bookingTime" required>
              <option value="">Select time</option>
              <option>12:00</option>
              <option>12:30</option>
              <option>13:00</option>
              <option>18:00</option>
              <option>18:30</option>
              <option>19:00</option>
              <option>19:30</option>
              <option>20:00</option>
              <option>20:30</option>
              <option>21:00</option>
            </select>
          </div>

          <div class="field">
            <label for="partySize">Party size</label>
            <select id="partySize" required>
              <option value="">Select party size</option>
              <option>1</option>
              <option>2</option>
              <option>3</option>
              <option>4</option>
              <option>5</option>
              <option>6</option>
              <option>8</option>
              <option>10</option>
            </select>
          </div>

          <div class="field">
            <label for="customerName">Your name</label>
            <input id="customerName" type="text" placeholder="Enter your name" required />
          </div>

          <div class="field full">
            <label for="note">Special request</label>
            <textarea id="note" placeholder="Optional: birthday, dietary request, seating preference..."></textarea>
          </div>
        </div>

        <div class="submit-wrap">
          <button id="submitBtn" class="submit-btn" type="submit">Submit booking</button>
        </div>
      </form>

      <div id="resultBox" class="result"></div>
    </section>
  </div>

  <script src="./restaurants.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const rid = params.get("rid");
    const phone = params.get("phone");

    const restaurant = (window.RESTAURANTS || []).find(r => r.id === rid);

    const restaurantName = document.getElementById("restaurantName");
    const restaurantArea = document.getElementById("restaurantArea");
    const restaurantCuisine = document.getElementById("restaurantCuisine");
    const restaurantPrice = document.getElementById("restaurantPrice");
    const restaurantScore = document.getElementById("restaurantScore");
    const restaurantDesc = document.getElementById("restaurantDesc");
    const restaurantImage = document.getElementById("restaurantImage");
    const resultBox = document.getElementById("resultBox");
    const form = document.getElementById("bookingForm");
    const submitBtn = document.getElementById("submitBtn");

    if (restaurant) {
      restaurantName.textContent = `${restaurant.name} / ${restaurant.en_name || restaurant.name}`;
      restaurantArea.textContent = restaurant.area_en || restaurant.area || "Unknown area";
      restaurantCuisine.textContent = restaurant.cuisine_en || restaurant.cuisine || "Unknown cuisine";
      restaurantPrice.textContent = restaurant.price || "";
      restaurantScore.textContent = restaurant.score ? `⭐ ${restaurant.score}/5` : "No score";
      restaurantDesc.textContent = restaurant.desc_en || restaurant.desc || "";
      restaurantImage.src = restaurant.image_url || "https://images.unsplash.com/photo-1517248135467-4c7edcad34c4";
    } else {
      restaurantName.textContent = "Restaurant not found";
      restaurantArea.textContent = "Unknown";
      restaurantCuisine.textContent = "Unknown";
      restaurantPrice.textContent = "";
      restaurantScore.textContent = "";
      restaurantDesc.textContent = "We can't find the selected restaurant.";
      restaurantImage.src = "https://images.unsplash.com/photo-1517248135467-4c7edcad34c4";
      form.style.display = "none";
    }

    form.addEventListener("submit", async function (e) {
      e.preventDefault();

      resultBox.className = "result";
      resultBox.textContent = "";
      submitBtn.disabled = true;
      submitBtn.textContent = "Submitting...";

      const payload = {
        restaurant_id: rid || "",
        restaurant_name: restaurant?.en_name || restaurant?.name || "",
        area: restaurant?.area_en || restaurant?.area || "",
        cuisine: restaurant?.cuisine_en || restaurant?.cuisine || "",
        booking_date: document.getElementById("bookingDate").value,
        booking_time: document.getElementById("bookingTime").value,
        party_size: document.getElementById("partySize").value,
        customer_name: document.getElementById("customerName").value,
        note: document.getElementById("note").value,
        customer_phone: phone || ""
      };

      try {
        const res = await fetch("https://bennyseamlessgroup.app.n8n.cloud/webhook/booking-submit", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        const result = await res.json();

        if (result.success) {
          resultBox.className = "result success";
          resultBox.textContent = "Booking submitted successfully.";
          form.reset();
        } else {
          resultBox.className = "result error";
          resultBox.textContent = "Booking failed. Please try again.";
        }
      } catch (err) {
        resultBox.className = "result error";
        resultBox.textContent = "Something went wrong while submitting your booking.";
        console.error(err);
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Submit booking";
      }
    });
  </script>
</body>
</html>
